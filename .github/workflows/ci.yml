name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repo structure
        run: |
          test -d packages/sanitize/src
          test -d packages/classify/src
          test -d packages/policy/src
          test -d packages/report/src
          test -f schemas/runtime-event.v1.json
